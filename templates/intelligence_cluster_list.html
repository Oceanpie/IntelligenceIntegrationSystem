<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggregated Intelligences - IIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/intelligence_table.css">
</head>
<body>

    <div class="article-list">
        <div class="controls-container">
            <label>
                Max Clusters:
                <select id="limit-select">
                    <option value="20">20</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                </select>
            </label>
            <button id="refresh-btn" class="refresh-btn" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>

        <h1>Aggregated Intelligences</h1>
        <p class="page-info" style="margin-top:-15px; margin-bottom:25px;">
            Displaying intelligence grouped by similarity (Offline Aggregation).
        </p>

        <div id="article-list-container">
            </div>
    </div>
    <script src="/static/js/article_detail_renderer.js"></script>
    <script src="/static/js/intelligence_table_renderer.js"></script>
    <script src="/static/js/article_modal_manager.js"></script>
    <script src="/static/js/intelligence_cluster_list.js"></script>
</body>
</html>
